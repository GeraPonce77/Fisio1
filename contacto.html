</head>
<body>
    <header>
        <div class="logo-area">
            <div class="logo-svg">
                <svg width="40" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="#2c7a5e"/><path d="M50 30 C42 30 36 36 36 44 C36 52 42 58 50 58 C58 58 64 52 64 44 C64 36 58 30 50 30Z" fill="white"/></svg>
            </div>
            <div><h1>Lalo y Gera</h1><p>Fisioterapia avanzada</p></div>
        </div>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Inicio</a></li>

                <li><a href="carrito.html">🛒 Carrito (<span id="cartCount">0</span>)</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Agende su cita</h1>
        
        <div class="contacto-grid">
            <!-- Datos de la agenda -->
            <div class="formulario-container">
                <h2>Agendar Reservación</h2>
                <form id="contactForm">
                    <div class="form-group">
                        <label>Nombre completo *</label>
                        <input type="text" id="nombre" required>
                    </div>
                    <div class="form-group">
                        <label>Teléfono *</label>
                        <input type="tel" id="telefono" required>
                    </div>
                    <div class="form-group">
                        <label>Correo electrónico *</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha *</label>
                        <input type="date" id="fechaCita" required>
                    </div>
                    <div class="form-group">
                        <label>Hora *</label>
                        <input type="time" id="horaCita" required>
                    </div>
                    <div class="form-group">
                        <label>Tipo de servicio</label>
                        <select id="servicioSelect">
                            <option value="consulta">Consulta única </option>
                            <option value="paquete5">Paquete 5 sesiones </option>
                            <option value="paquete10">Paquete 10 sesiones </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Precedentes Clínicos</label>
                        <textarea id="mensaje" rows="3"></textarea>
                    </div>
                    <button type="submit" id="btnEnviarContacto">✅ Confirmar reserva</button>
                    <div id="formFeedback" class="feedback-message"></div>
                </form>
            </div>

    </main>

   <footer>
        <div class="footer-content">
            <p>📧 contactanos lalo&gera@gmail.com</p>
            <p>© 2026 Lalo y Gera Fisioterapia</p>
        </div>
    </footer>

    <a href="https://wa.me/521234567890?text=Hola%2C%20quiero%20agendar%20una%20cita" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="script.js"></script>
</body>
</html>
