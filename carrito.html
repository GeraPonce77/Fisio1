<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lalo y Gera | Mi Carrito</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo-area">
            <div class="logo-svg">
                <svg width="40" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="#2c7a5e"/><path d="M50 30 C42 30 36 36 36 44 C36 52 42 58 50 58 C58 58 64 52 64 44 C64 36 58 30 50 30Z" fill="white"/></svg>
            </div>
            <div><h1>Lalo y Gera</h1><p>Fisioterapia avanzada</p></div>
        </div>
       <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="agenda.html">Contacto</a></li>
                <li><a href="ubicación.html">Ubicación</a></li>
                <li><a href="carrito.html">🛒 Carrito (<span id="cartCount">0</span>)</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="page-title">🛒 Nuestros Productos</h1>
        
        <div class="carrito-container">
            <div class="carrito-items" id="carritoItems">
                <!-- Los items del carrito se renderizan aquí -->
            </div>
            
            <div class="carrito-resumen">
                <h3>Resumen de compra</h3>
                <div class="resumen-linea">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0</span>
                </div>
                <div class="resumen-linea">
                    <span>Envío:</span>
                    <span id="envio">$0</span>
                </div>
                <div class="resumen-linea total">
                    <span>Total:</span>
                    <span id="total">$0</span>
                </div>
                
                <div class="cupon-section">
                    <input type="text" id="cuponCode" placeholder="Código de descuento">
                    <button id="aplicarCupon">Aplicar</button>
                </div>
                
                <button id="finalizarCompra" class="btn-finalizar">✅ Finalizar compra</button>
                <button id="vaciarCarrito" class="btn-vaciar">🗑️ Vaciar carrito</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>📧 contactanos lalo&gera@gmail.com</p>
            <p>© 2026 Lalo y Gera Fisioterapia</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
